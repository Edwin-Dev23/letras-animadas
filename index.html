<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti 🌻</title>
    <style>
        body { background: #000; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; overflow: hidden; }
        #lyric-display { position: absolute; width: 90%; text-align: center; z-index: 10; color: #fff; }
        .main-text { display: block; font-size: 2rem; color: #ffeb3b; font-weight: bold; margin-bottom: 10px; }
        .sub-text { display: block; font-size: 1.2rem; opacity: 0.8; }
        #btn-play { z-index: 20; padding: 20px; background: #ffeb3b; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .particle { position: absolute; top: -50px; z-index: 1; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        .signature { position: absolute; bottom: 20px; color: rgba(255,255,255,0.3); font-size: 0.8rem; }
    </style>
</head>
<body>
    <button id="btn-play">PRESIONA AQUÍ 🌻</button>
    <div id="lyric-display">
        <span class="main-text" id="main">Cargando tus flores...</span>
        <span class="sub-text" id="sub">Espera un momento ✨</span>
    </div>
    <div class="signature">by Edwin-Dev</div>

    <script>
        const audio = new Audio('cancion.mp3');
        const btn = document.getElementById('btn-play');
        const main = document.getElementById('main');
        const sub = document.getElementById('sub');

        const letras = [
            { t: 0, m: "Dicen que lo bueno...", s: "siempre se hace esperar ✨" },
            { t: 5, m: "Por eso estos girasoles", s: "tardaron un poquito más en florecer 🌻" },
            { t: 9, m: "Pero aquí están...", s: "con mucho cariño y dedicación." },
            { t: 13, m: "Porque es mejor tarde...", s: "que nunca." },
            { t: 17, m: "Él la estaba esperando con una flor amarilla 🧑🌻", s: "Ella lo estaba soñando con la luz en su pupila 🧑‍🦰✨" },
            { t: 32, m: "Y el amarillo del sol iluminaba la esquina 🌞", s: "Lo sentía tan cercano... lo sentía desde niña 🧑‍🦰✨" },
            { t: 46, m: "Ella sabía que él sabía que algún día pasaría...", s: "Que vendría a buscarla con sus flores amarillas 🌼" },
            { t: 59, m: "No te apures, no detengas el instante del encuentro 🌼", s: "La vida nunca está dormida 🌼" },
            { t: 76, m: "Ojalá la espera haya valido la pena 💛", s: "Con mucho cariño 💛✨🌻" }
        ];

        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = ['🌻', '🌼', '✨'][Math.floor(Math.random() * 3)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = '25px';
            p.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 7000);
        }

        btn.onclick = () => {
            btn.style.display = 'none';
            audio.play();
            setInterval(createParticle, 200);
            
            setInterval(() => {
                const tiempo = audio.currentTime;
                // Buscamos la frase que corresponde al tiempo actual
                const frase = [...letras].reverse().find(l => tiempo >= l.t);
                if (frase) {
                    main.innerText = frase.m;
                    sub.innerText = frase.s;
                }
            }, 100);
        };
    </script>
</body>
</html>
